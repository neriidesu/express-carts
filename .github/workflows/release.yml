name: release
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew buildAndCollect -Ppublish.release=true

      - name: Release to Modrinth and GitHub
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: ./gradlew publishMods -Ppublish.release=true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: expresscarts-release
          path: build/libs/